name: Anvil
options:
  bundleIdPrefix: com.gte619n
  createIntermediateGroups: true
targets:
  Anvil:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/Anvil
        excludes:
          - web
      # Bundled web client (generated by anvild/web/bundle-native.ts). Folder reference so the
      # `web/` directory is preserved in Resources, where BundleSchemeHandler resolves it.
      - path: Sources/Anvil/web
        type: folder
        optional: true
        buildPhase: resources
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gte619n.anvil
        PRODUCT_NAME: Anvil
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_CFBundleDisplayName: Anvil
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        # Local, unsigned build (no Apple Developer account needed) — ad-hoc sign.
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Resources/Anvil.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true

  Anvil-iOS:
    type: application
    platform: iOS
    deploymentTarget: "16.4"
    sources:
      - path: Sources/Anvil
        excludes:
          - web
      - path: Sources/Anvil/web
        type: folder
        optional: true
        buildPhase: resources
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info-iOS.plist
      properties:
        CFBundleDisplayName: Anvil
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen: {}
        # Portrait + landscape on both iPhone and iPad.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gte619n.anvil
        PRODUCT_NAME: Anvil
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        # 1 = iPhone, 2 = iPad → one universal binary covers iPhone, iPad, and iPad Mini.
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Signing is set per-developer in Xcode (needs the Apple Developer Program for push).
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Resources/Anvil-iOS.entitlements
      properties:
        # development for Xcode debug builds; flip to "production" for TestFlight/App Store.
        aps-environment: development
