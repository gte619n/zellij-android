name: iOS build & TestFlight

# Builds the Anvil iOS/iPadOS app and uploads it to TestFlight. Manual-trigger only — TestFlight
# processing is rate-limited and each upload consumes a build number, so we don't run it on every
# push the way Android does. Run it from the Actions tab (or `gh workflow run ios-release.yml`).
#
# Required repo secrets (mirror of the Secret Manager values — push with sync-github-secrets.sh):
#   IOS_DIST_P12_BASE64     base64 of the Apple Distribution .p12
#   IOS_DIST_P12_PASSWORD   its export password
#   APPLE_TEAM_ID           10-char Apple Developer Team ID
#   APPLE_API_KEY_BASE64    base64 of the App Store Connect AuthKey_*.p8 (App Manager role)
#   APPLE_API_KEY_ID        App Store Connect API Key ID
#   APPLE_API_ISSUER_ID     App Store Connect Issuer ID (UUID)
on:
  workflow_dispatch: {}

concurrency:
  group: ios-release
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Runners default xcode-select at the CLT; point it at the full Xcode (with the iOS SDK).
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install web client deps (anvild)
        working-directory: anvild
        run: bun install --frozen-lockfile

      # Import the distribution cert into an ephemeral keychain so xcodebuild can sign with it.
      # Automatic signing (-allowProvisioningUpdates, via the API key) handles the profile itself.
      - name: Set up signing keychain
        env:
          IOS_DIST_P12_BASE64: ${{ secrets.IOS_DIST_P12_BASE64 }}
          IOS_DIST_P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }}
        run: |
          set -euo pipefail
          [ -n "$IOS_DIST_P12_BASE64" ] || { echo "::error::IOS_DIST_P12_BASE64 secret not set"; exit 1; }
          KC="$RUNNER_TEMP/anvil-signing.keychain-db"
          KC_PASS="$(openssl rand -base64 24)"
          security create-keychain -p "$KC_PASS" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PASS" "$KC"
          echo "$IOS_DIST_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KC" -P "$IOS_DIST_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" "$KC" >/dev/null
          # Put our keychain first on the search list (keep the default login keychain too).
          security list-keychains -d user -s "$KC" login.keychain-db
          rm -f "$RUNNER_TEMP/dist.p12"
          echo "SIGNING_KEYCHAIN=$KC" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          [ -n "$APPLE_API_KEY_BASE64" ] || { echo "::error::APPLE_API_KEY_BASE64 secret not set"; exit 1; }
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey.p8"

      - name: Build & upload to TestFlight
        working-directory: apple
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/private_keys/AuthKey.p8
          ANVIL_BUILD_NUMBER: ${{ github.run_number }}
        run: ./make-ios.sh

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$SIGNING_KEYCHAIN" 2>/dev/null || true
          rm -rf "$RUNNER_TEMP/private_keys"
