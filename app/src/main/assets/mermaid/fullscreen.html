<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.5, maximum-scale=10, user-scalable=yes">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100vh;
      background: #1e1e1e;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    #diagram {
      display: inline-block;
      padding: 16px;
    }
    #diagram svg {
      display: block;
      max-width: none !important;
      height: auto !important;
    }
  </style>
  <script src="mermaid.min.js"></script>
</head>
<body>
  <div id="diagram"></div>

  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        darkMode: true,
        background: '#1e1e1e',
        primaryColor: '#6750A4',
        primaryTextColor: '#e0e0e0',
        lineColor: '#888888',
        secondaryColor: '#2d2d2d',
        tertiaryColor: '#3d3d3d'
      },
      securityLevel: 'loose',
      fontFamily: 'monospace'
    });

    async function renderDiagram(code) {
      try {
        var container = document.getElementById('diagram');
        var result = await mermaid.render('fullscreen-diagram', code);
        container.innerHTML = result.svg;
      } catch (e) {
        document.getElementById('diagram').innerHTML =
          '<p style="color:#CF6679;font-family:monospace;padding:24px;">Error: ' +
          e.message + '</p>';
      }
    }
  </script>
</body>
</html>
