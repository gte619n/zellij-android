<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin: 0; padding: 0; background: transparent; }
    #container { display: inline-block; }
  </style>
  <script src="mermaid.min.js"></script>
</head>
<body>
  <div id="container"></div>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        darkMode: true,
        background: '#1e1e1e',
        primaryColor: '#6750A4',
        primaryTextColor: '#e0e0e0',
        lineColor: '#888888',
        secondaryColor: '#2d2d2d',
        tertiaryColor: '#3d3d3d'
      },
      securityLevel: 'loose',
      fontFamily: 'monospace'
    });

    var renderCounter = 0;

    async function renderMermaid(code) {
      try {
        renderCounter++;
        var containerId = 'mermaid-' + renderCounter;

        var container = document.getElementById('container');
        container.innerHTML = '';

        var result = await mermaid.render(containerId, code);
        container.innerHTML = result.svg;

        // Wait for SVG to be fully laid out
        await new Promise(function(resolve) { requestAnimationFrame(resolve); });
        await new Promise(function(resolve) { requestAnimationFrame(resolve); });

        var svgEl = container.querySelector('svg');
        if (!svgEl) {
          MermaidBridge.onError('No SVG element produced');
          return;
        }

        var bbox = svgEl.getBoundingClientRect();
        var width = Math.ceil(bbox.width) || 800;
        var height = Math.ceil(bbox.height) || 600;

        // Ensure SVG has explicit dimensions for canvas rendering
        svgEl.setAttribute('width', width);
        svgEl.setAttribute('height', height);

        // Serialize SVG and use data URL (more reliable than Blob URL on Android)
        var svgData = new XMLSerializer().serializeToString(svgEl);
        var encodedSvg = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));

        var img = new Image();
        img.onload = function() {
          try {
            var scale = 2; // 2x for crisp rendering on high-DPI
            var canvas = document.getElementById('canvas');
            canvas.width = width * scale;
            canvas.height = height * scale;

            var ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);
            ctx.drawImage(img, 0, 0, width, height);

            var dataUrl = canvas.toDataURL('image/png');
            var base64 = dataUrl.split(',')[1];

            MermaidBridge.onRendered(base64, width * scale, height * scale);
          } catch (canvasErr) {
            MermaidBridge.onError('Canvas error: ' + canvasErr.message);
          }
        };
        img.onerror = function(e) {
          MermaidBridge.onError('Failed to load SVG image: ' + (e.message || 'unknown'));
        };
        img.src = encodedSvg;

      } catch (e) {
        MermaidBridge.onError(e.message || 'Unknown mermaid error');
      }
    }
  </script>
</body>
</html>
