<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Anvil</title>
    <link rel="stylesheet" href="/katex/katex.min.css" />
    <link rel="stylesheet" href="/xterm.css" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="side-head">
          <div id="conn" class="conn">connecting…</div>
          <button id="theme-toggle" title="Toggle dark mode">🌓</button>
        </div>
        <div id="budget" class="budget"></div>
        <button id="new-session">+ New session</button>
        <ul id="session-list"></ul>
      </aside>
      <main id="main">
        <header id="header">
          <span id="header-left">
            <button class="hbtn" id="btn-sidebar" title="Toggle sidebar">☰</button>
            <span id="header-title">Anvil</span>
          </span>
          <span id="header-actions">
            <button class="hbtn" id="btn-files" title="Files">📁</button>
            <button class="hbtn" id="btn-terminal" title="Terminal">⌨</button>
            <span id="status"></span>
          </span>
        </header>
        <div id="main-body">
          <div id="convo-col">
            <div id="conversation"></div>
            <form id="composer">
              <div id="input-box">
                <div id="attach-row"></div>
                <textarea id="input" rows="1" placeholder="Message Claude…"></textarea>
                <div id="composer-controls">
                  <button type="button" id="btn-attach" title="Attach image">📎</button>
                  <span class="spacer"></span>
                  <button type="submit" id="send" title="Send" disabled>↑</button>
                </div>
              </div>
              <input type="file" id="file-input" accept="image/*" multiple hidden />
            </form>
          </div>
          <aside id="side-panel">
            <div id="panel-tabs">
              <button class="ptab" data-view="files">Files</button>
              <button class="ptab" data-view="reader">Reader</button>
              <button class="ptab" data-view="terminal">Terminal</button>
              <span class="ptab-spacer"></span>
              <button id="panel-close" title="Close">✕</button>
            </div>
            <div id="panel-content"></div>
          </aside>
        </div>
      </main>
    </div>
    <div id="modal-root"></div>
    <div id="toast"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
