<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Anvil</title>
    <link rel="icon" href="/anvil.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/anvil.svg" />
    <meta name="theme-color" content="#2F2739" />
    <link rel="stylesheet" href="/katex/katex.min.css" />
    <link rel="stylesheet" href="/xterm.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div class="side-head">
          <button id="sidebar-collapse" class="icon-btn" title="Hide sidebar"><span class="msym">menu_open</span></button>
          <span class="brand"><img src="/anvil.svg" class="brand-logo" alt="" /> Anvil<small id="brand-version" class="brand-version"></small></span>
          <span class="side-head-spacer"></span>
          <button id="theme-toggle" title="Toggle dark mode"><span class="msym">brightness_6</span></button>
        </div>
        <ul id="concierge-list"></ul>
        <div id="session-scroll">
          <ul id="session-list"></ul>
        </div>
        <div id="finished-section" hidden>
          <div id="finished-head"><span class="msym">check_circle</span> Finished</div>
          <ul id="finished-list"></ul>
        </div>
        <button id="open-settings" class="sidebar-foot"><span class="msym">tune</span> Settings &amp; servers</button>
      </aside>
      <main id="main">
        <header id="header">
          <span id="header-left">
            <button class="hbtn" id="btn-sidebar" title="Toggle sidebar"><span class="msym">menu</span></button>
            <span id="conn-dot" class="conn-dot" title="Connecting…"></span>
            <span id="header-title">Anvil</span>
          </span>
          <span id="header-actions">
            <button class="hbtn" id="btn-new-topic" title="New topic — start a fresh context, keep the history" hidden><span class="msym">restart_alt</span></button>
            <button class="hbtn" id="btn-files" title="Files"><span class="msym">folder</span></button>
            <button class="hbtn" id="btn-git" title="Git"><span class="msym">account_tree</span></button>
            <button class="hbtn" id="btn-terminal" title="Terminal"><span class="msym">terminal</span></button>
            <button class="hbtn" id="btn-links" title="Links"><span class="msym">link</span></button>
            <button class="hbtn" id="btn-notify" title="Notifications" hidden><span class="msym">notifications_off</span></button>
          </span>
        </header>
        <div id="offline-banner" class="offline-banner" hidden></div>
        <div id="main-body">
          <div id="convo-col">
            <div id="conversation"></div>
            <button id="scroll-bottom" class="scroll-bottom" title="Jump to latest" hidden><span class="msym">arrow_downward</span></button>
            <form id="composer">
              <div id="input-box">
                <div id="attach-row"></div>
                <textarea id="input" rows="1" placeholder="Message Claude…"></textarea>
                <div id="composer-controls">
                  <button type="button" id="btn-attach" title="Attach file"><span class="msym">attach_file</span></button>
                  <span class="spacer"></span>
                  <button type="button" id="stop" title="Stop" hidden>
                    <span class="msym">stop</span>
                  </button>
                  <button type="submit" id="send" title="Send" disabled>
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="5" /><polyline points="5 12 12 5 19 12" /></svg>
                  </button>
                </div>
              </div>
              <input type="file" id="file-input" multiple hidden />
            </form>
          </div>
          <aside id="side-panel">
            <div id="panel-tabs">
              <button class="ptab" data-view="files"><span class="msym">folder</span> Files</button>
              <button class="ptab" data-view="reader"><span class="msym">description</span> Reader</button>
              <button class="ptab" data-view="git"><span class="msym">account_tree</span> Git</button>
              <button class="ptab" data-view="terminal"><span class="msym">terminal</span> Terminal</button>
              <button class="ptab" data-view="links"><span class="msym">link</span> Links</button>
              <span class="ptab-spacer"></span>
              <button id="panel-close" title="Close"><span class="msym">close</span></button>
            </div>
            <div id="panel-content"></div>
          </aside>
        </div>
      </main>
    </div>
    <div id="settings-root"></div>
    <div id="modal-root"></div>
    <div id="toast"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
